spring.application.name=backend_contratos

# ============================================================
# DATABASE - Carregado do .env automaticamente pelo EnvLoader
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/backend_contratos}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# SECURITY - JWT Secret carregado do .env
# ============================================================
app.security.jwt-secret=${JWT_SECRET:Y2hhbmdlLW1lLWZvci1sb2NhbC1kZXYtc2VjcmV0LWtleS0zMi1ieXRlcw==}

# ============================================================
# VALIDACAO DE VARIAVEIS OBRIGATORIAS
# ============================================================
required-env.db-url=${DB_URL}
required-env.db-username=${DB_USERNAME}
required-env.db-password=${DB_PASSWORD}
required-env.jwt-secret=${JWT_SECRET}

# ============================================================
# JPA / HIBERNATE - Banco de dados
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# ERROR HANDLING - Nao expor detalhes internos
# ============================================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================================
# LOGGING - Debug authentication and security issues
# ============================================================
logging.level.com.malloc.backend_contratos=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG

